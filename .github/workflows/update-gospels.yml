name: Aggiorna Vangeli

on:
  # Ogni lunedì alle 05:00 UTC scarica i prossimi 28 giorni
  schedule:
    - cron: '0 5 * * 1'

  # Avvio manuale dalla scheda Actions (es. prima volta, o per forzare)
  workflow_dispatch:

jobs:
  fetch-gospels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scarica prossimi 28 giorni di vangeli
        run: node fetch-gospels.js 28

      - name: Commit gospels.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add gospels.json
          git diff --staged --quiet || git commit -m "✝ Aggiorna vangeli $(date +%Y-%m-%d)"
          git push
